</style></head><body><div class="app"><header><div><h1>いまはこれだけ 🤍</h1><div class="sub">Life Dashboard｜人生の進捗</div></div><button class="soft tiny" id="dumpOpen">＋思いつき</button></header>
<main id="home" class="page active"><section class="card"><h2>今日の体力</h2><div class="g3"><button class="energy soft" data-e="1">限界</button><button class="energy soft" data-e="2">重い</button><button class="energy soft" data-e="3">普通</button></div><div id="energyMsg" class="notice" style="margin-top:9px"></div></section><section class="card"><div class="between"><h2>今日はこれだけ</h2><span class="pill" id="focusCount"></span></div><div id="focusList"></div><button class="soft" id="autoPick" style="width:100%">自動で選ぶ</button></section><section class="card"><h2>次の1個だけ</h2><div class="notice" id="nextOne"></div><button class="pri" id="notify" style="width:100%;margin-top:9px">🔔 何分後かに知らせる</button></section><section class="card"><h2>今月の進捗</h2><div class="dash"><div class="mini">夜職収入<br><b id="hIncome">¥0</b></div><div class="mini">支払い予定<br><b id="hPay">¥0</b></div></div><div class="progress" style="margin-top:12px"><div class="bar" id="hBar"></div></div><div class="between" style="margin-top:7px"><span class="hint" id="hGoal"></span><b id="hRemain"></b></div><div class="notice" id="deadlineInfo" style="margin-top:9px"></div></section><section class="card"><h2>プロジェクト進捗</h2><div id="hProjects"></div></section></main>
<main id="life" class="page"><section class="card"><h2>人生リスト</h2><div class="g2"><input id="wish" placeholder="叶えたいこと"><select id="wishCat"><option>勉強</option><option>仕事・お金</option><option>美容</option><option>旅行</option><option>創作</option><option>生活</option></select></div><button class="pri" id="addWish" style="width:100%;margin-top:9px">追加</button></section><section class="card"><div id="wishList"></div></section></main>
<main id="projects" class="page"><section class="card"><h2>プロジェクト</h2><div class="g2"><input id="proTitle" placeholder="例：引っ越し"><input id="proDate" type="date"></div><textarea id="proTasks" style="margin-top:9px" placeholder="子タスクを改行で入力"></textarea><button class="pri" id="addPro" style="width:100%;margin-top:9px">作る</button></section><section class="card"><div id="proList"></div></section></main>
<main id="tasks" class="page"><section class="card"><h2>今月・今日のToDo</h2><textarea id="taskText" placeholder="改行でまとめて追加"></textarea><div class="g2" style="margin-top:9px"><select id="taskCat"><option>やるべきこと</option><option>やりたいこと</option><option>仕事・お金</option><option>健康・生活</option><option>勉強</option><option>創作</option></select><select id="taskMin"><option value="5">5分</option><option value="15" selected>15分</option><option value="30">30分</option><option value="60">1時間以上</option></select></div><div class="g2" style="margin-top:9px"><select id="taskUrg"><option value="today">今日〜明日</option><option value="month" selected>今月</option><option value="later">いつか</option></select><button class="pri" id="addTask">追加</button></div></section><section class="card"><div id="taskList"></div></section></main>
<main id="income" class="page"><section class="card"><h2>目標金額</h2><div class="g2"><label class="hint">目標額<input id="goal" type="number"></label><label class="hint">期限<input id="goalDate" type="date"></label></div><div class="progress" style="margin-top:12px"><div class="bar" id="iBar"></div></div><div class="between" style="margin-top:8px"><div class="money" id="iTotal">¥0</div><div class="hint" id="iRemain"></div></div><div class="dash" style="margin-top:9px"><div class="mini">残り日数<br><b id="days">—</b></div><div class="mini">1日あたり<br><b id="perDay">—</b></div></div></section><section class="card"><h2>ついた枠を入力</h2><div class="g2"><input id="sDate" type="date"><input id="sMin" type="number" placeholder="何分"></div><div class="g2" style="margin-top:9px"><select id="sOpt"><option>オプションなし</option><option>オプションあり</option></select><select id="sNom"><option>フリー</option><option>ネット指名</option><option>本指名</option></select></div><div class="g2" style="margin-top:9px"><input id="sAmount" type="number" placeholder="手取り額"><input id="sCost" type="number" placeholder="経費"></div><input id="sMemo" style="margin-top:9px" placeholder="メモ"><button class="pri" id="addSession" style="width:100%;margin-top:9px">追加</button></section><section class="card"><h2>今月の統計</h2><div class="dash"><div class="mini">本数<br><b id="cnt">0本</b></div><div class="mini">平均手取り<br><b id="avg">¥0</b></div><div class="mini">オプション率<br><b id="optRate">0%</b></div><div class="mini">本指名率<br><b id="nomRate">0%</b></div></div><div class="notice" id="minStats" style="margin-top:9px"></div></section><section class="card"><div id="sessionList"></div></section></main>
<main id="money" class="page"><section class="card"><h2>支払いメモ</h2><div class="g2"><input id="payName" placeholder="家賃、カードなど"><input id="payAmount" type="number" placeholder="金額"></div><div class="g2" style="margin-top:9px"><input id="payDate" type="date"><select id="payType"><option>確定</option><option>未確定</option><option>概算</option></select></div><textarea id="payMemo" style="margin-top:9px" placeholder="内訳・分割残りなど"></textarea><button class="pri" id="addPay" style="width:100%">追加</button></section><section class="card"><div class="between"><h2>支払い予定</h2><div class="money" id="payTotal">¥0</div></div><div id="payList"></div></section><section class="card"><h2>保存</h2><div class="notice">端末内に自動保存。バックアップをiCloud Driveへ保存できます。</div><div class="g2" style="margin-top:9px"><button class="soft" id="export">バックアップ</button><button class="ghost" id="importBtn">復元</button></div><input id="importFile" type="file" accept=".json" hidden></section></main></div>
<nav><div><button class="nav active" data-p="home"><b>♡</b>ホーム</button><button class="nav" data-p="life"><b>∞</b>人生</button><button class="nav" data-p="projects"><b>◫</b>進捗</button><button class="nav" data-p="tasks"><b>✓</b>ToDo</button><button class="nav" data-p="income"><b>¥</b>収入</button><button class="nav" data-p="money"><b>⌁</b>支払い</button></div></nav><div class="modal" id="modal"><div class="sheet"><div class="between"><h2>脳みそダンプ</h2><button class="soft" id="dumpClose">×</button></div><textarea id="dumpText" placeholder="思いついたことを改行で全部"></textarea><button class="pri" id="dumpSave" style="width:100%;margin-top:9px">今月のToDoへ入れる</button></div></div>
<script>
const K='imakore-life-v1';let S={energy:2,tasks:[],wishes:[],projects:[],sessions:[],payments:[],goal:300000,goalDate:''};const $=q=>document.querySelector(q),$$=q=>[...document.querySelectorAll(q)],id=()=>Date.now().toString(36)+Math.random().toString(36).slice(2),yen=n=>'¥'+Math.round(+n||0).toLocaleString(),today=()=>{let d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)},save=()=>localStorage.setItem(K,JSON.stringify(S));try{S={...S,...JSON.parse(localStorage.getItem(K)||'{}')}}catch(e){}const lim=()=>S.energy===1?1:S.energy===2?2:3,score=t=>({today:40,month:20,later:0}[t.urg]||0)+({5:20,15:14,30:8,60:2}[t.min]||0)+(t.cat==='仕事・お金'?8:0),focus=()=>S.tasks.filter(t=>t.focus&&!t.done).sort((a,b)=>score(b)-score(a)),month=()=>today().slice(0,7),sess=()=>S.sessions.filter(x=>x.date.slice(0,7)===month()),income=()=>sess().reduce((a,x)=>a+(+x.amount||0)-(+x.cost||0),0),payTotal=()=>S.payments.reduce((a,x)=>a+(x.type==='未確定'?0:(+x.amount||0)),0),days=(a,b)=>Math.max(0,Math.ceil((new Date(b+'T23:59')-new Date(a+'T00:00'))/864e5));
function taskHTML(t,f=false){let n=focus().indexOf(t)+1;return `<div class="item ${t.done?'done':''}"><div class="row">${f?`<div class="num">${n}</div>`:`<button class="check ${t.done?'on':''}" data-a="done" data-id="${t.id}">${t.done?'✓':''}</button>`}<div class="grow"><div class="ttl">${t.title}</div><div class="meta"><span class="pill">${t.cat}</span><span class="pill">${t.min}分</span></div></div></div><div class="actions">${f?`<button class="soft tiny" data-a="done" data-id="${t.id}">終わった</button><button class="ghost tiny" data-a="out" data-id="${t.id}">外す</button>`:`<button class="soft tiny" data-a="in" data-id="${t.id}">今日やる</button>`}<button class="danger tiny" data-a="del" data-id="${t.id}">削除</button></div></div>`}function proProgress(p){return p.tasks.length?Math.round(p.tasks.filter(x=>x.done).length/p.tasks.length*100):0}
function render(){ $$('.energy').forEach(b=>b.classList.toggle('active',+b.dataset.e===S.energy));$('#energyMsg').textContent={1:'今日は1個で合格。',2:'今日は2個まで。',3:'今日は3個まで。'}[S.energy];let f=focus();$('#focusCount').textContent=f.length+'/'+lim();$('#focusList').innerHTML=f.length?f.map(x=>taskHTML(x,true)).join(''):'<div class="empty">今日のタスクは空です。</div>';$('#nextOne').textContent=f.length?'次はこれだけ：'+f[0].title:'今日のタスクを選ぶと表示します。';$('#taskList').innerHTML=S.tasks.length?S.tasks.map(x=>taskHTML(x)).join(''):'<div class="empty">ToDoはまだありません。</div>';$('#wishList').innerHTML=S.wishes.length?S.wishes.map(w=>`<div class="item"><div class="between"><div><b>${w.title}</b><div class="meta">${w.cat}・${w.status}</div></div><select data-w="${w.id}" style="width:auto"><option ${w.status==='未着手'?'selected':''}>未着手</option><option ${w.status==='進行中'?'selected':''}>進行中</option><option ${w.status==='達成'?'selected':''}>達成</option></select></div></div>`).join(''):'<div class="empty">人生リストは空です。</div>';$('#proList').innerHTML=S.projects.length?S.projects.map(p=>`<div class="project"><div class="between"><b>${p.title}</b><b>${proProgress(p)}%</b></div><div class="progress" style="margin:8px 0"><div class="bar" style="width:${proProgress(p)}%"></div></div>${p.tasks.map(t=>`<div class="row" style="padding:6px 0"><button class="check ${t.done?'on':''}" data-sub="${p.id}" data-sid="${t.id}">${t.done?'✓':''}</button><span>${t.title}</span></div>`).join('')}<button class="danger tiny" data-pdel="${p.id}">削除</button></div>`).join(''):'<div class="empty">プロジェクトは空です。</div>';$('#hProjects').innerHTML=S.projects.slice(0,4).map(p=>`<div class="project"><div class="between"><b>${p.title}</b><b>${proProgress(p)}%</b></div><div class="progress" style="margin-top:8px"><div class="bar" style="width:${proProgress(p)}%"></div></div></div>`).join('')||'<div class="empty">進行中なし</div>';let inc=income(),rem=Math.max(0,S.goal-inc),pct=S.goal?Math.min(100,Math.round(inc/S.goal*100)):0;$('#hIncome').textContent=$('#iTotal').textContent=yen(inc);$('#hPay').textContent=yen(payTotal());$('#hBar').style.width=$('#iBar').style.width=pct+'%';$('#hGoal').textContent=`目標 ${yen(S.goal)}・${pct}%`;$('#hRemain').textContent='あと '+yen(rem);$('#iRemain').textContent=`${pct}%・あと ${yen(rem)}`;let d=S.goalDate?days(today(),S.goalDate):0;$('#deadlineInfo').textContent=S.goalDate?`期限まであと${d}日・1日平均 ${d?yen(Math.ceil(rem/d)):'—'}`:`目標期限を設定すると「あと何日」が出ます。`;$('#days').textContent=S.goalDate?d+'日':'—';$('#perDay').textContent=S.goalDate&&d?yen(Math.ceil(rem/d)):'—';$('#goal').value=S.goal;$('#goalDate').value=S.goalDate;let ss=sess();$('#cnt').textContent=ss.length+'本';$('#avg').textContent=yen(ss.length?inc/ss.length:0);$('#optRate').textContent=(ss.length?Math.round(ss.filter(x=>x.opt.includes('あり')).length/ss.length*100):0)+'%';$('#nomRate').textContent=(ss.length?Math.round(ss.filter(x=>x.nom==='本指名').length/ss.length*100):0)+'%';let ms={};ss.forEach(x=>ms[x.min]=(ms[x.min]||0)+1);$('#minStats').textContent=Object.entries(ms).map(([m,c])=>`${m}分 ${c}本`).join(' ／ ')||'記録なし';$('#sessionList').innerHTML=ss.map(x=>`<div class="item"><div class="between"><div><b>${x.date}・${x.min}分</b><div class="meta">${x.opt}・${x.nom}</div></div><b>${yen(x.amount-x.cost)}</b></div></div>`).join('')||'<div class="empty">今月の枠なし</div>';$('#payTotal').textContent=yen(payTotal());$('#payList').innerHTML=S.payments.map(x=>`<div class="item"><div class="between"><div><b>${x.name}</b><div class="meta">${x.date||'日付未定'}・${x.type}</div></div><b>${x.type==='未確定'?'未確定':yen(x.amount)}</b></div></div>`).join('')||'<div class="empty">支払いなし</div>'}
function addTasks(text,cat='やるべきこと',min=15,urg='month'){text.split('\n').map(x=>x.trim()).filter(Boolean).forEach(title=>S.tasks.push({id:id(),title,cat,min:+min,urg,done:false,focus:false}))}$('#autoPick').onclick=()=>{S.tasks.forEach(t=>t.focus=false);S.tasks.filter(t=>!t.done).sort((a,b)=>score(b)-score(a)).slice(0,lim()).forEach(t=>t.focus=true);save();render()};$$('.energy').forEach(b=>b.onclick=()=>{S.energy=+b.dataset.e;$('#autoPick').click()});$('#addTask').onclick=()=>{addTasks($('#taskText').value,$('#taskCat').value,$('#taskMin').value,$('#taskUrg').value);$('#taskText').value='';save();render()};$('#addWish').onclick=()=>{if($('#wish').value){S.wishes.push({id:id(),title:$('#wish').value,cat:$('#wishCat').value,status:'未着手'});$('#wish').value='';save();render()}};$('#addPro').onclick=()=>{if($('#proTitle').value){S.projects.push({id:id(),title:$('#proTitle').value,date:$('#proDate').value,tasks:$('#proTasks').value.split('\n').filter(Boolean).map(title=>({id:id(),title,done:false}))});$('#proTitle').value=$('#proTasks').value='';save();render()}};$('#sDate').value=today();$('#addSession').onclick=()=>{if(!$('#sMin').value||!$('#sAmount').value)return alert('分数と金額を入れてね');S.sessions.push({id:id(),date:$('#sDate').value,min:+$('#sMin').value,opt:$('#sOpt').value,nom:$('#sNom').value,amount:+$('#sAmount').value,cost:+$('#sCost').value||0,memo:$('#sMemo').value});$('#sMin').value=$('#sAmount').value=$('#sCost').value=$('#sMemo').value='';save();render()};$('#goal').onchange=e=>{S.goal=+e.target.value;save();render()};$('#goalDate').onchange=e=>{S.goalDate=e.target.value;save();render()};$('#addPay').onclick=()=>{if(!$('#payName').value)return;S.payments.push({id:id(),name:$('#payName').value,amount:+$('#payAmount').value||0,date:$('#payDate').value,type:$('#payType').value,memo:$('#payMemo').value});$('#payName').value=$('#payAmount').value=$('#payDate').value=$('#payMemo').value='';save();render()};document.addEventListener('click',e=>{let a=e.target.closest('[data-a]');if(a){let t=S.tasks.find(x=>x.id===a.dataset.id);if(a.dataset.a==='done'){t.done=!t.done;t.focus=false}if(a.dataset.a==='out')t.focus=false;if(a.dataset.a==='in'){if(focus().length>=lim())return alert('今日は上限まで');t.focus=true}if(a.dataset.a==='del')S.tasks=S.tasks.filter(x=>x.id!==t.id);save();render()}let st=e.target.closest('[data-sub]');if(st){let p=S.projects.find(x=>x.id===st.dataset.sub),t=p.tasks.find(x=>x.id===st.dataset.sid);t.done=!t.done;save();render()}let pd=e.target.closest('[data-pdel]');if(pd){S.projects=S.projects.filter(x=>x.id!==pd.dataset.pdel);save();render()}});document.addEventListener('change',e=>{let w=e.target.closest('[data-w]');if(w){S.wishes.find(x=>x.id===w.dataset.w).status=w.value;save();render()}});$$('.nav').forEach(b=>b.onclick=()=>{$$('.nav').forEach(x=>x.classList.remove('active'));b.classList.add('active');$$('.page').forEach(x=>x.classList.remove('active'));$('#'+b.dataset.p).classList.add('active');scrollTo(0,0)});$('#dumpOpen').onclick=()=>$('#modal').classList.add('show');$('#dumpClose').onclick=()=>$('#modal').classList.remove('show');$('#dumpSave').onclick=()=>{addTasks($('#dumpText').value);$('#dumpText').value='';$('#modal').classList.remove('show');save();render()};$('#notify').onclick=async()=>{let f=focus()[0];if(!f)return alert('先に今日のタスクを選んでね');let p=await Notification.requestPermission();if(p!=='granted')return;let m=prompt('何分後？','15');if(m)setTimeout(()=>new Notification('次はこれだけ 🤍',{body:f.title}),+m*60000)};$('#export').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}));a.download='いまはこれだけ-バックアップ.json';a.click()};$('#importBtn').onclick=()=>$('#importFile').click();$('#importFile').onchange=async e=>{S={...S,...JSON.parse(await e.target.files[0].text())};save();render()};if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');render();
</script></body></html>
